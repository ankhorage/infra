name: Resolve PR 16 conflict markers

on:
  push:

permissions:
  contents: write

jobs:
  resolve:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: '#15/phase0'
          fetch-depth: 0

      - name: Remove stray conflict markers
        run: |
          python - <<'PY'
          from pathlib import Path

          paths = [
              Path('src/adapters/minikube/auth/supabase/profile.integration.test.ts'),
              Path('src/adapters/minikube/base/index.test.ts'),
          ]

          for path in paths:
              lines = path.read_text(encoding='utf-8').splitlines(keepends=True)
              filtered = [line for line in lines if line.rstrip('\r\n') != '<<<<<<< HEAD']
              path.write_text(''.join(filtered), encoding='utf-8')
          PY

          if grep -RInE '^(<<<<<<<|=======|>>>>>>>)' --exclude-dir=.git .; then
            echo 'Unresolved merge conflict markers remain.' >&2
            exit 1
          fi

          rm .github/workflows/resolve-pr16-conflict-markers.yml
          git diff --check

      - name: Commit resolved files
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            src/adapters/minikube/auth/supabase/profile.integration.test.ts \
            src/adapters/minikube/base/index.test.ts \
            .github/workflows/resolve-pr16-conflict-markers.yml
          git commit -m 'fix: resolve merge conflict markers'
          git push origin HEAD:'#15/phase0'
