name: Format final Phase 0 changes

on:
  pull_request:

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: '#15/phase0'
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.13'

      - name: Format changed sources and restore CI
        run: |
          bun install --frozen-lockfile
          bunx prettier --write \
            src/adapters/minikube/base/index.ts \
            src/adapters/minikube/base/index.test.ts \
            src/adapters/minikube/auth/supabase/profile.integration.test.ts

          if grep -RInE '^(<<<<<<<|=======|>>>>>>>)' --exclude-dir=.git .; then
            echo 'Unresolved merge conflict markers remain.' >&2
            exit 1
          fi

          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml
          git diff --check

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            src/adapters/minikube/base/index.ts \
            src/adapters/minikube/base/index.test.ts \
            src/adapters/minikube/auth/supabase/profile.integration.test.ts \
            .github/workflows/ci.yml
          git commit -m 'style: format final Phase 0 changes'
          git push origin HEAD:'#15/phase0'
