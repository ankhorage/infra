name: Bootstrap Supabase Vault integration

on:
  push:
    branches:
      - foundation/supabase-vault-integration

permissions:
  contents: write

jobs:
  bootstrap:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: foundation/supabase-vault-integration
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.13'

      - name: Integrate secret-store selection into base generation
        run: |
          python3 <<'PY'
          from pathlib import Path

          path = Path('src/adapters/minikube/base/index.ts')
          text = path.read_text()

          replacements = [
              (
                  "  const databaseProvider = manifest.database?.provider ?? 'none';\n  const storageMetadata = resolveAppInfraStorageMetadata(manifest);",
                  "  const databaseProvider = manifest.database?.provider ?? 'none';\n  const secretStoreProvider = manifest.secretStore?.provider ?? 'none';\n  const storageMetadata = resolveAppInfraStorageMetadata(manifest);",
              ),
              (
                  "  const supabaseLocalEnabled =\n    authProvider === 'supabase' || databaseProvider === 'supabase' || storageMetadata !== null;",
                  "  const supabaseLocalEnabled =\n    authProvider === 'supabase' ||\n    databaseProvider === 'supabase' ||\n    storageMetadata !== null ||\n    secretStoreProvider === 'supabase-vault';",
              ),
              (
                  "        databaseProvider,\n        storageMetadata,",
                  "        databaseProvider,\n        secretStoreProvider,\n        storageMetadata,",
              ),
              (
                  "  databaseProvider: string;\n  storageMetadata: AppInfraStorageMetadata | null;",
                  "  databaseProvider: string;\n  secretStoreProvider: string;\n  storageMetadata: AppInfraStorageMetadata | null;",
              ),
              (
                  "    databaseProvider,\n    storageMetadata,",
                  "    databaseProvider,\n    secretStoreProvider,\n    storageMetadata,",
              ),
              (
                  '  DATABASE_PROVIDER: "${databaseProvider}"\n${storageLines}  NETWORK_DOMAIN:',
                  '  DATABASE_PROVIDER: "${databaseProvider}"\n  SECRET_STORE_PROVIDER: "${secretStoreProvider}"\n${storageLines}  NETWORK_DOMAIN:',
              ),
          ]

          for old, new in replacements:
              if old not in text:
                  raise SystemExit(f'Missing expected base-generator snippet:\n{old}')
              text = text.replace(old, new, 1)

          path.write_text(text)
          PY

      - name: Install and update lockfile
        run: bun install

      - name: Format generated changes
        run: bun run format

      - name: Verify implementation
        run: |
          bun run build
          bun run typecheck
          bun run lint
          bun run test
          bun run knip
          bun run docs
          bun run format
          bun run build
          bun run typecheck
          bun run lint
          bun run test
          bun run knip
          bun run format:check

      - name: Commit generated lockfile and documentation
        run: |
          rm .github/workflows/bootstrap-supabase-vault.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
          else
            git commit -m "chore: finalize Supabase Vault infra integration"
            git push origin HEAD:foundation/supabase-vault-integration
          fi
