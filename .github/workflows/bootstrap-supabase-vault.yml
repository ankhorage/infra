name: Bootstrap Supabase Vault integration

on:
  push:
    branches:
      - foundation/supabase-vault-integration

permissions:
  contents: write

jobs:
  bootstrap:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: foundation/supabase-vault-integration
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.13'

      - name: Enable local Supabase for the Vault provider
        run: |
          python3 <<'PY'
          from pathlib import Path

          path = Path('src/adapters/minikube/base/index.ts')
          text = path.read_text()
          old = """  const supabaseLocalEnabled =
    authProvider === 'supabase' || databaseProvider === 'supabase' || storageMetadata !== null;"""
          new = """  const supabaseLocalEnabled =
    authProvider === 'supabase' ||
    databaseProvider === 'supabase' ||
    storageMetadata !== null ||
    manifest.secretStore?.provider === 'supabase-vault';"""

          if old not in text:
              raise SystemExit('Expected Supabase local enablement expression was not found.')

          path.write_text(text.replace(old, new, 1))
          PY

      - name: Install and format
        run: |
          bun install
          bun run format

      - name: Verify
        run: |
          bun run build
          bun run typecheck
          bun run lint
          bun run test
          bun run knip
          bun run format:check

      - name: Commit final generated changes
        run: |
          rm .github/workflows/bootstrap-supabase-vault.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: finalize Supabase Vault infra lifecycle"
          git push origin HEAD:foundation/supabase-vault-integration
