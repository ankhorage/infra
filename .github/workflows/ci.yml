name: Apply final Phase 0 fixes

on:
  pull_request:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: '#15/phase0'
          fetch-depth: 0

      - name: Patch generated verification and tests
        run: |
          python - <<'PY'
          from pathlib import Path

          def keep_head_side(source: str) -> str:
              lines = source.splitlines(keepends=True)
              result: list[str] = []
              index = 0
              while index < len(lines):
                  if not lines[index].lstrip().startswith('<<<<<<< '):
                      result.append(lines[index])
                      index += 1
                      continue

                  index += 1
                  head: list[str] = []
                  while index < len(lines) and not lines[index].lstrip().startswith('======='):
                      head.append(lines[index])
                      index += 1
                  if index >= len(lines):
                      raise SystemExit('Unterminated merge conflict before separator')

                  index += 1
                  while index < len(lines) and not lines[index].lstrip().startswith('>>>>>>> '):
                      index += 1
                  if index >= len(lines):
                      raise SystemExit('Unterminated merge conflict after separator')

                  result.extend(head)
                  index += 1
              return ''.join(result)

          base_path = Path('src/adapters/minikube/base/index.ts')
          base = keep_head_side(base_path.read_text(encoding='utf-8'))

          anon_update = "or has_any_column_privilege('anon', format('public.%I', profile_table), 'UPDATE')\n    or has_table_privilege('anon', format('public.%I', profile_table), 'DELETE')"
          anon_references = "or has_any_column_privilege('anon', format('public.%I', profile_table), 'UPDATE')\n    or has_any_column_privilege('anon', format('public.%I', profile_table), 'REFERENCES')\n    or has_table_privilege('anon', format('public.%I', profile_table), 'DELETE')"
          if anon_update not in base:
              raise SystemExit('Expected anon UPDATE/DELETE privilege sequence not found')
          base = base.replace(anon_update, anon_references, 1)

          auth_insert = "if has_any_column_privilege('authenticated', format('public.%I', profile_table), 'INSERT')\n    or has_table_privilege('authenticated', format('public.%I', profile_table), 'DELETE') then"
          auth_references = "if has_any_column_privilege('authenticated', format('public.%I', profile_table), 'INSERT')\n    or has_any_column_privilege('authenticated', format('public.%I', profile_table), 'REFERENCES')\n    or has_table_privilege('authenticated', format('public.%I', profile_table), 'DELETE') then"
          if auth_insert not in base:
              raise SystemExit('Expected authenticated INSERT/DELETE privilege sequence not found')
          base = base.replace(auth_insert, auth_references, 1)
          base = base.replace(
              'authenticated role must not have profile table INSERT or DELETE privilege',
              'authenticated role must not have profile table INSERT, DELETE, or REFERENCES privilege',
              1,
          )
          base_path.write_text(base, encoding='utf-8')

          unit_path = Path('src/adapters/minikube/base/index.test.ts')
          unit = unit_path.read_text(encoding='utf-8')
          anon_assertion = """    expect(status).toContain(
            "has_any_column_privilege('anon', format('public.%I', profile_table), 'UPDATE')",
          );
          """
          if anon_assertion not in unit:
              raise SystemExit('Expected anon UPDATE assertion not found')
          unit = unit.replace(
              anon_assertion,
              anon_assertion
              + """    expect(status).toContain(
            "has_any_column_privilege('anon', format('public.%I', profile_table), 'REFERENCES')",
          );
          """,
              1,
          )

          auth_assertion = """    expect(status).toContain(
            "has_any_column_privilege('authenticated', format('public.%I', profile_table), 'INSERT')",
          );
          """
          if auth_assertion not in unit:
              raise SystemExit('Expected authenticated INSERT assertion not found')
          unit = unit.replace(
              auth_assertion,
              auth_assertion
              + """    expect(status).toContain(
            "has_any_column_privilege('authenticated', format('public.%I', profile_table), 'REFERENCES')",
          );
          """,
              1,
          )
          unit = unit.replace(
              'authenticated role must not have profile table INSERT or DELETE privilege',
              'authenticated role must not have profile table INSERT, DELETE, or REFERENCES privilege',
              1,
          )
          unit_path.write_text(unit, encoding='utf-8')

          integration_path = Path('src/adapters/minikube/auth/supabase/profile.integration.test.ts')
          integration = integration_path.read_text(encoding='utf-8')
          insertion_point = """  integrationTest(
            'status reports custom-column update privilege drift',
          """
          new_test = """  integrationTest(
            'status reports column-scoped references privilege drift',
            async () => {
              const { appRoot, minikubeRoot, namespaceHint } = await createIntegrationProject();

              try {
                await writeGeneratedFiles(
                  appRoot,
                  generateInfrastructure(createManifest({ fields: ['email'] }), { namespaceHint }).files,
                );
                await runLocalSupabaseEnv(minikubeRoot);
                await runSupabaseSql(
                  minikubeRoot,
                  'grant references (email) on table public.profiles to anon;',
                );

                const anonFailure = await expectGeneratedStatusFailure(minikubeRoot);
                expect(anonFailure).toContain('profile schema: drift detected');

                await runSupabaseSql(
                  minikubeRoot,
                  `revoke references (email) on table public.profiles from anon;
                   grant references (email) on table public.profiles to authenticated;`,
                );

                const authenticatedFailure = await expectGeneratedStatusFailure(minikubeRoot);
                expect(authenticatedFailure).toContain('profile schema: drift detected');
              } finally {
                await cleanupIntegrationProject(appRoot, minikubeRoot);
              }
            },
            INTEGRATION_TIMEOUT_MS,
          );

          """
          if insertion_point not in integration:
              raise SystemExit('Expected integration insertion point not found')
          integration = integration.replace(insertion_point, new_test + insertion_point, 1)
          integration_path.write_text(integration, encoding='utf-8')
          PY

          if grep -RInE '^(<<<<<<<|=======|>>>>>>>)' --exclude-dir=.git .; then
            echo 'Unresolved merge conflict markers remain.' >&2
            exit 1
          fi

          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml
          git diff --check

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            src/adapters/minikube/base/index.ts \
            src/adapters/minikube/base/index.test.ts \
            src/adapters/minikube/auth/supabase/profile.integration.test.ts \
            .github/workflows/ci.yml
          git commit -m 'fix: finalize Phase 0 privilege verification'
          git push origin HEAD:'#15/phase0'
