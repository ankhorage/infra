name: Fix Generated API Handler Lint

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/fix-generated-api-handler-lint.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.13'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Fix generated memory-store handlers
        run: |
          python3 <<'PY'
          from pathlib import Path

          def replace_exact(path: Path, old: str, new: str, expected: int = 1) -> None:
              content = path.read_text()
              count = content.count(old)
              if count != expected:
                  raise SystemExit(
                      f'{path}: expected {expected} occurrence(s), found {count}: {old!r}'
                  )
              path.write_text(content.replace(old, new))

          source = Path('src/apis.ts')
          replace_exact(
              source,
              '    async list(apiId: string): Promise<readonly GeneratedApiRecord[]> {',
              '    list(apiId: string): Promise<readonly GeneratedApiRecord[]> {',
          )
          replace_exact(
              source,
              '      return getRows(records, apiId).map(cloneRecord);',
              '      return Promise.resolve(getRows(records, apiId).map(cloneRecord));',
          )
          replace_exact(
              source,
              '    async read(apiId: string, id: string): Promise<GeneratedApiRecord | null> {',
              '    read(apiId: string, id: string): Promise<GeneratedApiRecord | null> {',
          )
          replace_exact(
              source,
              '      if (primaryKey === null) return null;',
              '      if (primaryKey === null) return Promise.resolve(null);',
              expected=3,
          )
          replace_exact(
              source,
              '      return record === undefined ? null : cloneRecord(record);',
              '      return Promise.resolve(record === undefined ? null : cloneRecord(record));',
          )
          replace_exact(
              source,
              '    async create(apiId: string, values: GeneratedApiRecord): Promise<GeneratedApiRecord> {',
              '    create(apiId: string, values: GeneratedApiRecord): Promise<GeneratedApiRecord> {',
          )
          replace_exact(
              source,
              '      return cloneRecord(nextRecord);',
              '      return Promise.resolve(cloneRecord(nextRecord));',
              expected=2,
          )
          replace_exact(
              source,
              '    async update(',
              '    update(',
          )
          replace_exact(
              source,
              '      if (index < 0) return null;',
              '      if (index < 0) return Promise.resolve(null);',
          )
          replace_exact(
              source,
              '    async delete(apiId: string, id: string): Promise<GeneratedApiRecord | null> {',
              '    delete(apiId: string, id: string): Promise<GeneratedApiRecord | null> {',
          )
          replace_exact(
              source,
              '      if (deleted === undefined) return null;',
              '      if (deleted === undefined) return Promise.resolve(null);',
          )
          replace_exact(
              source,
              '      return cloneRecord(deleted);',
              '      return Promise.resolve(cloneRecord(deleted));',
          )

          test_file = Path('src/apis.test.ts')
          replace_exact(
              test_file,
              "    expect(handlersFile?.content).toContain('createGeneratedApiMemoryStore');\n    expect(handlersFile?.content).toContain('poker_situations');",
              "    expect(handlersFile?.content).toContain('createGeneratedApiMemoryStore');\n    expect(handlersFile?.content).not.toMatch(\n      /\\basync (?:list|read|create|update|delete)\\(/,\n    );\n    expect(handlersFile?.content).toContain('poker_situations');",
          )

          changeset = Path('.changeset/generated-api-handler-promises.md')
          changeset.write_text(
              "---\n'@ankhorage/infra': patch\n---\n\n"
              "Generate synchronous in-memory API store methods as explicit promises so generated apps pass require-await linting.\n"
          )
          PY

      - name: Validate
        run: |
          bun run build
          bun run lint
          bun run typecheck
          bun run test
          git diff --check

      - name: Commit validated fix
        run: |
          rm .github/workflows/fix-generated-api-handler-lint.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/apis.ts src/apis.test.ts .changeset/generated-api-handler-promises.md .github/workflows/fix-generated-api-handler-lint.yml
          git commit -m "fix: generate lint-safe API memory handlers"
          git push
