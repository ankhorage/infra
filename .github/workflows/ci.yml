name: Normalize final Phase 0 test

on:
  pull_request:

permissions:
  contents: write

jobs:
  normalize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: '#15/phase0'
          fetch-depth: 0

      - name: Normalize test block and restore CI
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/adapters/minikube/auth/supabase/profile.integration.test.ts')
          lines = path.read_text(encoding='utf-8').splitlines(keepends=True)

          start = next(
              index
              for index in range(len(lines) - 1)
              if lines[index].strip() == 'integrationTest('
              and 'status reports column-scoped references privilege drift' in lines[index + 1]
          )
          end = next(
              index
              for index in range(start + 1, len(lines))
              if lines[index].strip() == ');'
          )

          for index in range(start + 1, end):
              lines[index] = '  ' + lines[index]

          path.write_text(''.join(lines), encoding='utf-8')
          PY

          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml

          if git grep -nE '^(<<<<<<<|=======|>>>>>>>)'; then
            echo 'Unresolved merge conflict markers remain.' >&2
            exit 1
          fi

          git diff --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            src/adapters/minikube/auth/supabase/profile.integration.test.ts \
            .github/workflows/ci.yml
          git commit -m 'style: normalize final Phase 0 integration test'
          git push origin HEAD:'#15/phase0'
