name: Fix Contracts 2 Infra Migration

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/fix-contracts-2-release.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Apply canonical auth contract fixes
        run: |
          python3 <<'PY'
          from pathlib import Path

          def replace_exact(path: str, old: str, new: str, expected: int = 1) -> None:
              file_path = Path(path)
              content = file_path.read_text()
              count = content.count(old)
              if count != expected:
                  raise SystemExit(
                      f'{path}: expected {expected} occurrence(s), found {count}: {old!r}'
                  )
              file_path.write_text(content.replace(old, new))

          replace_exact(
              'src/adapters/minikube/auth/supabase/index.ts',
              "manifest.auth?.authorization.engine ?? 'native'",
              "manifest.auth?.authorization?.engine ?? 'none'",
          )
          replace_exact(
              'src/adapters/minikube/auth/supabase/index.ts',
              "manifest.auth?.authorization.kind ?? 'RBAC'",
              "manifest.auth?.authorization?.kind ?? 'none'",
          )
          replace_exact(
              'src/adapters/minikube/base/index.ts',
              "manifest.auth?.authorization.engine ?? 'none'",
              "manifest.auth?.authorization?.engine ?? 'none'",
          )
          replace_exact(
              'src/adapters/minikube/authz/cerbos/index.ts',
              "import type { AppManifest, NavigatorSpec, RouteDefinition } from '@ankhorage/contracts';",
              """import type { AppManifest, NavigatorSpec, RouteDefinition } from '@ankhorage/contracts';
          import { resolveAuthFlow } from '@ankhorage/contracts/auth';""",
          )
          replace_exact(
              'src/adapters/minikube/authz/cerbos/index.ts',
              "Pick<AppManifest, 'metadata' | 'navigator' | 'screens' | 'settings'>",
              "Pick<AppManifest, 'infra' | 'metadata' | 'navigator' | 'screens'>",
              expected=2,
          )
          replace_exact(
              'src/adapters/minikube/authz/cerbos/index.ts',
              """  const routes = appManifest?.navigator ? flattenNavigatorRoutes(appManifest.navigator) : [];
            const signInRoute = appManifest?.settings.authFlow.signInRoute;
            const signUpRoute = appManifest?.settings.authFlow.signUpRoute;
            const unauthorizedRoute = appManifest?.settings.authFlow.unauthorizedRoute;""",
              """  const routes = appManifest?.navigator ? flattenNavigatorRoutes(appManifest.navigator) : [];
            const flow = resolveAuthFlow(appManifest?.infra.auth?.flow);
            const signInRoute = flow.signInRoute;
            const signUpRoute = flow.signUpRoute;
            const unauthorizedRoute = flow.unauthorizedRoute;""",
          )
          PY

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.13'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate migration
        run: |
          bun run build
          bun run typecheck
          bun run lint
          bun run test
          ! grep -R --line-number --fixed-strings 'settings.authFlow' src
          git diff --check

      - name: Commit validated fixes
        run: |
          rm .github/workflows/fix-contracts-2-release.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src .github/workflows/fix-contracts-2-release.yml
          git commit -m "fix: support auth without authorization"
          git push
